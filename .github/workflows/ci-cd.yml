name: CI/CD

on:
  pull_request:

  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io


jobs:

  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend Docker image
        run: |
          docker build \
            --build-arg CI=true \
            --build-arg NEXT_PUBLIC_GIPHY_API_KEY=${{ secrets.GIPHY_API_KEY }} \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --target builder \
            -t frontend-ci \
            ./frontend

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Load database schema
        run: |
          PGPASSWORD=postgres psql \
            -h localhost \
            -U postgres \
            -d postgres \
            -f database.sql

      - name: Run backend tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
          REDIS_URL: redis://localhost:6379
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        run: cargo test --all --release

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run coverage
        working-directory: ./backend
        run: |
          cargo tarpaulin \
            --all \
            --engine llvm \
            --out Xml \
            --timeout 120

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/cobertura.xml
        continue-on-error: true

  deploy_web:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Set lowercase image names
        run: |
          REPO=$(echo "${GITHUB_REPOSITORY,,}")
          echo "IMAGE_FRONTEND=ghcr.io/$REPO/frontend" >> $GITHUB_ENV
          echo "IMAGE_BACKEND=ghcr.io/$REPO/backend" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_GIPHY_API_KEY=${{ secrets.GIPHY_API_KEY }} \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.API_BASE_URL }} \
            -t $IMAGE_FRONTEND:$TAG \
            -t $IMAGE_FRONTEND:latest \
            ./frontend

      - name: Push frontend
        run: |
          docker push $IMAGE_FRONTEND:$TAG
          docker push $IMAGE_FRONTEND:latest

      - name: Build backend
        run: |
          docker build \
            -f ./backend/Dockerfile \
            -t $IMAGE_BACKEND:$TAG \
            -t $IMAGE_BACKEND:latest \
            ./backend

      - name: Push backend
        run: |
          docker push $IMAGE_BACKEND:$TAG
          docker push $IMAGE_BACKEND:latest

      - name: Deploy backend
        run: curl -X POST ${{ secrets.RENDER_BACKEND_HOOK_PROD }}

      - name: Deploy frontend
        run: curl -X POST ${{ secrets.RENDER_FRONTEND_HOOK_PROD }}

  tag_release:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create new tag
        id: tag
        run: |
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -n1)

          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi

          VERSION=${LATEST#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          NEW_TAG="v$MAJOR.$MINOR.$((PATCH + 1))"

          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag $NEW_TAG
          git push origin $NEW_TAG


  release_desktop:
    runs-on: ${{ matrix.platform }}

    needs: tag_release
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            artifact_name: linux

          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            artifact_name: macos-arm

          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            artifact_name: macos-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            frontend/src-tauri/target
          key: ${{ runner.os }}-cargo-tauri-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}

      - name: Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Install deps
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps --include=optional

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_GIPHY_API_KEY: ${{ secrets.GIPHY_API_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.API_BASE_URL }}
          IS_TAURI: "true"
        with:
          projectPath: ./frontend
          tagName: ${{ github.ref_name }}
          releaseName: Release ${{ github.ref_name }}
          releaseBody: Automated release
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}