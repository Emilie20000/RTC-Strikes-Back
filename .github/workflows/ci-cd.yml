name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend
  IMAGE_BACKEND: ghcr.io/${{ github.repository }}/backend

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ======================
      # FRONTEND BUILD CHECK
      # ======================
      - name: Build frontend Docker image
        run: |
          docker build \
            --build-arg CI=true \
            --build-arg NEXT_PUBLIC_GIPHY_API_KEY=${{ secrets.GIPHY_API_KEY }} \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --target builder \
            -t frontend-ci \
            ./frontend

      # ======================
      # BACKEND SETUP
      # ======================
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}

      # ======================
      # INIT DATABASE (IMPORTANT)
      # ======================
      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Load database schema
        run: |
          PGPASSWORD=postgres psql \
            -h localhost \
            -U postgres \
            -d postgres \
            -f database.sql

            # ======================
      # BACKEND TESTS
      # ======================
      - name: Run backend tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        run: cargo test --all --release

      # ======================
      # COVERAGE
      # ======================
      - name: Run coverage
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        run: |
          cargo tarpaulin \
            --all \
            --engine llvm \
            --out Xml \
            --timeout 120

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/cobertura.xml
        continue-on-error: true

  deploy_web:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      #
      # FRONTEND IMAGE
      #
      - name: Build frontend Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_GIPHY_API_KEY=${{ secrets.GIPHY_API_KEY }} \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.API_BASE_URL }} \
            -t $IMAGE_FRONTEND:$TAG \
            -t $IMAGE_FRONTEND:latest \
            ./frontend

      - name: Push frontend Docker image
        run: |
          docker push $IMAGE_FRONTEND:$TAG
          docker push $IMAGE_FRONTEND:latest

      #
      # BACKEND IMAGE
      #
      - name: Build backend Docker image
        run: |
          docker build \
            -f ./backend/Dockerfile \
            -t $IMAGE_BACKEND:$TAG \
            -t $IMAGE_BACKEND:latest \
            ./backend

      - name: Push backend Docker image
        run: |
          docker push $IMAGE_BACKEND:$TAG
          docker push $IMAGE_BACKEND:latest

      #
      # DATABASE
      #
      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Apply DB migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_TOKEN }}

      #
      # DEPLOY
      #
      - name: Deploy backend (Render)
        run: curl -X POST ${{ secrets.RENDER_BACKEND_HOOK_PROD }}

      - name: Deploy frontend (Render)
        run: curl -X POST ${{ secrets.RENDER_FRONTEND_HOOK_PROD }}

  release_desktop:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            artifact_name: linux

          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            artifact_name: macos-arm

          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            artifact_name: macos-x64

          - platform: windows-latest
            args: ""
            artifact_name: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Tauri Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            frontend/src-tauri/target
          key: ${{ runner.os }}-cargo-tauri-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Install frontend deps
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps --include=optional

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_GIPHY_API_KEY: ${{ secrets.GIPHY_API_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.API_BASE_URL }}
          IS_TAURI: "true"
        with:
          projectPath: ./frontend
          tagName: ${{ github.ref_name }}
          releaseName: Release ${{ github.ref_name }}
          releaseBody: See CHANGELOG for details.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Rename artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          find frontend/src-tauri/target/release/bundle \
            -name "*.AppImage" \
            -exec cp {} app.AppImage \;

      - name: Rename artifacts (macOS arm)
        if: matrix.platform == 'macos-latest' && matrix.artifact_name == 'macos-arm'
        run: |
          find frontend/src-tauri/target/aarch64-apple-darwin/release/bundle \
            -name "*.dmg" \
            -exec cp {} app.dmg \;

      - name: Rename artifacts (macOS x64)
        if: matrix.platform == 'macos-latest' && matrix.artifact_name == 'macos-x64'
        run: |
          find frontend/src-tauri/target/x86_64-apple-darwin/release/bundle \
            -name "*.dmg" \
            -exec cp {} app-x64.dmg \;

      - name: Rename artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter "*.exe" frontend/src-tauri/target/release/bundle |
          Copy-Item -Destination app.exe

      - name: Upload renamed artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            app.AppImage
            app.dmg
            app-x64.dmg
            app.exe
        continue-on-error: true