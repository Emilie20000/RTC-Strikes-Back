ddress":[24901507],"length":1,"stats":{"Line":2}},{"line":598,"address":[23880320],"length":1,"stats":{"Line":2}},{"line":599,"address":[26040168],"length":1,"stats":{"Line":2}},{"line":602,"address":[23451920],"length":1,"stats":{"Line":1}},{"line":603,"address":[23703544],"length":1,"stats":{"Line":1}},{"line":606,"address":[23467600],"length":1,"stats":{"Line":2}},{"line":607,"address":[24963880],"length":1,"stats":{"Line":2}}],"covered":210,"coverable":247},{"path":["/","usr","src","app","src","services","trophee.rs"],"content":"use chrono::{DateTime, Utc};\nuse serde::Serialize;\nuse socketioxide::SocketIo;\nuse sqlx::{PgPool, Row};\nuse std::collections::HashMap;\nuse uuid::Uuid;\n\n#[derive(Debug, Serialize, Clone)]\npub struct Trophee {\n    pub id: String,\n    pub title: Option\u003cString\u003e,\n    pub condition: Option\u003cString\u003e,\n    pub description_fun: Option\u003cString\u003e,\n    pub status: String,\n    pub progress: Option\u003ci32\u003e,\n    pub current: Option\u003ci64\u003e,\n    pub goal: Option\u003ci64\u003e,\n    pub unlocked_at: Option\u003cDateTime\u003cUtc\u003e\u003e,\n    pub trophee_type: String,\n}\n\n#[derive(Debug, Serialize, Clone)]\n#[serde(rename_all = \"camelCase\")]\npub struct TropheeUnlockedPayload {\n    pub id: String,\n    pub title: String,\n    pub toast: String,\n    pub trophee_type: String,\n    pub unlocked_at: DateTime\u003cUtc\u003e,\n}\n\n#[derive(Debug)]\npub struct SyncResult {\n    pub trophees: Vec\u003cTrophee\u003e,\n    pub newly_unlocked: Vec\u003cTropheeUnlockedPayload\u003e,\n}\n\n#[derive(Debug, Clone, Copy)]\nstruct Definition {\n    id: \u0026'static str,\n    title: \u0026'static str,\n    condition: \u0026'static str,\n    description_fun: \u0026'static str,\n    goal: i64,\n    trophee_type: \u0026'static str,\n    secret: bool,\n}\n\n#[derive(Debug)]\nstruct UserStats {\n    messages_count: i64,\n    reactions_count: i64,\n    owned_servers_count: i64,\n    joined_servers_count: i64,\n    has_avatar: bool,\n}\n\nconst DEFINITIONS: [Definition; 7] = [\n    Definition {\n        id: \"welcome_aboard\",\n        title: \"Bienvenue a bord\",\n        condition: \"Creer un compte\",\n        description_fun: \"Le voyage commence maintenant.\",\n        goal: 1,\n        trophee_type: \"profil\",\n        secret: false,\n    },\n    Definition {\n        id: \"first_message\",\n        title: \"Premier message\",\n        condition: \"Envoyer 1 message\",\n        description_fun: \"Une petite phrase, un grand pas.\",\n        goal: 1,\n        trophee_type: \"social\",\n        secret: false,\n    },\n    Definition {\n        id: \"talkative\",\n        title: \"Bavard\",\n        condition: \"Envoyer 10 messages\",\n        description_fun: \"Tu commences a te faire entendre.\",\n        goal: 10,\n        trophee_type: \"social\",\n        secret: false,\n    },\n    Definition {\n        id: \"community_builder\",\n        title: \"Createur de communaute\",\n        condition: \"Posseder 1 serveur\",\n        description_fun: \"Ton royaume prend forme.\",\n        goal: 1,\n        trophee_type: \"social\",\n        secret: false,\n    },\n    Definition {\n        id: \"reaction_fan\",\n        title: \"Reaction master\",\n        condition: \"Ajouter 5 reactions\",\n        description_fun: \"Tu parles aussi en emojis.\",\n        goal: 5,\n        trophee_type: \"social\",\n        secret: false,\n    },\n    Definition {\n        id: \"social_circle\",\n        title: \"Cercle social\",\n        condition: \"Rejoindre 3 serveurs\",\n        description_fun: \"Toujours plus de monde a rencontrer.\",\n        goal: 3,\n        trophee_type: \"social\",\n        secret: false,\n    },\n    Definition {\n        id: \"mystery_ghost\",\n        title: \"Fantome legendaire\",\n        condition: \"Envoyer 50 messages\",\n        description_fun: \"Le serveur murmure ton nom.\",\n        goal: 50,\n        trophee_type: \"social\",\n        secret: true,\n    },\n];\n\npub async fn ensure_schema(pool: \u0026PgPool) -\u003e Result\u003c(), sqlx::Error\u003e {\n    sqlx::query(\n        r#\"\n        CREATE TABLE IF NOT EXISTS user_trophies (\n            user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,\n            trophy_id VARCHAR(100) NOT NULL,\n            unlocked_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n            PRIMARY KEY (user_id, trophy_id)\n        )\n        \"#,\n    )\n    .execute(pool)\n    .await?;\n\n    Ok(())\n}\n\npub async fn sync_user_trophees(pool: \u0026PgPool, user_id: Uuid) -\u003e Result\u003cSyncResult, sqlx::Error\u003e {\n    ensure_schema(pool).await?;\n\n    let stats = get_user_stats(pool, user_id).await?;\n\n    let rows = sqlx::query(\n        r#\"\n        SELECT trophy_id, unlocked_at\n        FROM user_trophies\n        WHERE user_id = $1\n        \"#,\n    )\n    .bind(user_id)\n    .fetch_all(pool)\n    .await?;\n\n    let mut unlocked_map: HashMap\u003cString, DateTime\u003cUtc\u003e\u003e = HashMap::new();\n    for row in rows {\n        let trophy_id: String = row.get(\"trophy_id\");\n        let unlocked_at: DateTime\u003cUtc\u003e = row.get(\"unlocked_at\");\n        unlocked_map.insert(trophy_id, unlocked_at);\n    }\n\n    let mut newly_unlocked = Vec::new();\n    let mut trophees = Vec::with_capacity(DEFINITIONS.len());\n\n    for definition in DEFINITIONS {\n        let current = metric_for(definition.id, \u0026stats);\n        let should_be_unlocked = current \u003e= definition.goal;\n\n        if should_be_unlocked \u0026\u0026 !unlocked_map.contains_key(definition.id) {\n            let inserted_unlocked_at = sqlx::query_scalar::\u003c_, DateTime\u003cUtc\u003e\u003e(\n                r#\"\n                INSERT INTO user_trophies (user_id, trophy_id)\n                VALUES ($1, $2)\n                ON CONFLICT (user_id, trophy_id) DO NOTHING\n                RETURNING unlocked_at\n                \"#,\n            )\n            .bind(user_id)\n            .bind(definition.id)\n            .fetch_optional(pool)\n            .await?;\n\n            if let Some(unlocked_at) = inserted_unlocked_at {\n                unlocked_map.insert(definition.id.to_string(), unlocked_at);\n                newly_unlocked.push(TropheeUnlockedPayload {\n                    id: definition.id.to_string(),\n                    title: definition.title.to_string(),\n                    toast: definition.description_fun.to_string(),\n                    trophee_type: definition.trophee_type.to_string(),\n                    unlocked_at,\n                });\n            }\n        }\n\n        let unlocked_at = unlocked_map.get(definition.id).cloned();\n        let is_unlocked = unlocked_at.is_some();\n\n        let status = if is_unlocked {\n            \"unlocked\".to_string()\n        } else if definition.secret {\n            \"secret\".to_string()\n        } else {\n            \"in_progress\".to_string()\n        };\n\n        let progress = if is_unlocked {\n            Some(100)\n        } else {\n            Some(((current as f64 / definition.goal as f64) * 100.0).clamp(0.0, 100.0) as i32)\n        };\n\n        let title = if definition.secret \u0026\u0026 !is_unlocked {\n            None\n        } else {\n            Some(definition.title.to_string())\n        };\n\n        let condition = if definition.secret \u0026\u0026 !is_unlocked {\n            None\n        } else {\n            Some(definition.condition.to_string())\n        };\n\n        let description_fun = if definition.secret \u0026\u0026 !is_unlocked {\n            None\n        } else {\n            Some(definition.description_fun.to_string())\n        };\n\n        trophees.push(Trophee {\n            id: definition.id.to_string(),\n            title,\n            condition,\n            description_fun,\n            status,\n            progress,\n            current: Some(current),\n            goal: Some(definition.goal),\n            unlocked_at,\n            trophee_type: definition.trophee_type.to_string(),\n        });\n    }\n\n    Ok(SyncResult {\n        trophees,\n        newly_unlocked,\n    })\n}\n\npub async fn notify_unlocked(io: \u0026SocketIo, user_id: Uuid, trophies: \u0026[TropheeUnlockedPayload]) {\n    if trophies.is_empty() {\n        return;\n    }\n\n    let room = format!(\"user:{}\", user_id);\n\n    for trophy in trophies {\n        let _ = io.to(room.clone()).emit(\"trophee_unlocked\", trophy).await;\n    }\n\n    let payload = serde_json::json!({ \"userId\": user_id.to_string() });\n    let _ = io.to(room).emit(\"trophees_updated\", \u0026payload).await;\n}\n\nasync fn get_user_stats(pool: \u0026PgPool, user_id: Uuid) -\u003e Result\u003cUserStats, sqlx::Error\u003e {\n    let messages_count = query_count_or_zero(\n        pool,\n        \"SELECT COUNT(*)::BIGINT FROM messages m JOIN users u ON m.author = u.username WHERE u.id = $1\",\n        user_id,\n    )\n    .await?;\n\n    let reactions_count =\n        query_count_or_zero(pool, \"SELECT COUNT(*)::BIGINT FROM message_reactions WHERE user_id = $1\", user_id)\n            .await?;\n\n    let owned_servers_count =\n        query_count_or_zero(pool, \"SELECT COUNT(*)::BIGINT FROM servers WHERE owner_id = $1\", user_id)\n            .await?;\n\n    let joined_servers_count =\n        query_count_or_zero(pool, \"SELECT COUNT(*)::BIGINT FROM server_members WHERE user_id = $1\", user_id)\n            .await?;\n\n    let has_avatar = query_bool_or_false(\n        pool,\n        \"SELECT COALESCE(avatar_url IS NOT NULL AND avatar_url \u003c\u003e '', FALSE) FROM users WHERE id = $1\",\n        user_id,\n    )\n    .await?;\n\n    Ok(UserStats {\n        messages_count,\n        reactions_count,\n        owned_servers_count,\n        joined_servers_count,\n        has_avatar,\n    })\n}\n\nasync fn query_count_or_zero(pool: \u0026PgPool, query: \u0026str, user_id: Uuid) -\u003e Result\u003ci64, sqlx::Error\u003e {\n    match sqlx::quer     pub user_id: String,\n    pub emoji: String,\n}\n\n#[derive(Debug, Deserialize, Serialize)]\n#[serde(rename_all = \"camelCase\")]\npub struct ScreenSharePayload {\n    pub user_id: String,\n    pub channel_id: String,\n}\n\npub async fn on_connect(socket: SocketRef) {\n    println!(\"Socket connected: {}\", socket.id);\n\n    socket.on(\"identify\", handle_identify);\n    socket.on(\"join\", handle_join);\n    socket.on(\"join_voice\", handle_join_voice);\n    socket.on(\"leave_voice\", handle_leave_voice);\n    socket.on(\"voice_mute\", handle_voice_mute);\n    socket.on(\"offer\", handle_offer);\n    socket.on(\"answer\", handle_answer);\n    socket.on(\"ice_candidate\", handle_ice_candidate);\n    socket.on(\"leave\", handle_leave);\n    socket.on(\"typing\", handle_typing);\n    socket.on(\"stop_typing\", handle_stop_typing);\n    socket.on(\"send_message\", handle_send_message);\n    socket.on(\"screen_share_started\", handle_screen_share_started);\n    socket.on(\"screen_share_stopped\", handle_screen_share_stopped);\n    socket.on(\"camera_video_started\", handle_camera_video_started);\n    socket.on(\"camera_video_stopped\", handle_camera_video_stopped);\n    socket.on(\"add_reaction\", handle_add_reaction);\n    socket.on(\"remove_reaction\", handle_remove_reaction);\n    socket.on(\"disconnect\", handle_disconnect);\n}\n\npub async fn handle_identify(socket: SocketRef, Data::\u003cString\u003e(user_id): Data\u003cString\u003e) {\n    println!(\"Socket {} identifying as user {}\", socket.id, user_id);\n    socket.join(format!(\"user:{}\", user_id));\n}\n\npub async fn handle_join(socket: SocketRef, Data::\u003cString\u003e(room): Data\u003cString\u003e, State::\u003cArc\u003cDashMap\u003cString, VoiceState\u003e\u003e\u003e(voice_users): State\u003cArc\u003cDashMap\u003cString, VoiceState\u003e\u003e\u003e) {\n    println!(\"Socket {} attempting to join room '{}'\", socket.id, room);\n    socket.join(room.clone());\n    println!(\"✅ Socket {} successfully joined room '{}'\", socket.id, room);\n\n    if room.starts_with(\"server:\") {\n        let server_id = room.trim_start_matches(\"server:\");\n        let states: Vec\u003cVoiceState\u003e = voice_users\n            .iter()\n            .filter(|r| r.value().server_id == server_id)\n            .map(|r| r.value().clone())\n            .collect();\n        \n        if !states.is_empty() {\n             let _ = socket.emit(\"voice_states\", \u0026states);\n        }\n    }\n}\n\npub async fn handle_join_voice(\n    socket: SocketRef, \n    Data::\u003cJoinVoicePayload\u003e(data): Data\u003cJoinVoicePayload\u003e, \n    State::\u003cArc\u003cDashMap\u003cString, VoiceState\u003e\u003e\u003e(voice_users): State\u003cArc\u003cDashMap\u003cString, VoiceState\u003e\u003e\u003e, \n    State::\u003cPgPool\u003e(pool): State\u003cPgPool\u003e\n) {\n    let room = format!(\"voice:{}\", data.channel_id);\n    println!(\"User {} joining voice channel {}\", data.user_id, data.channel_id);\n    socket.join(room.clone());\n\n    let user_data = sqlx::query(\"SELECT username, avatar_url FROM users WHERE id = $1\")\n        .bind(uuid::Uuid::parse_str(\u0026data.user_id).unwrap_or_default())\n        .fetch_optional(\u0026pool)\n        .await\n        .unwrap_or(None);\n    \n    let (username, avatar_url) = if let Some(row) = user_data {\n        (\n            row.try_get(\"username\").unwrap_or_else(|_| \"Unknown\".to_string()),\n            row.try_get(\"avatar_url\").ok()\n        )\n    } else {\n        (\"Unknown\".to_string(), None)\n    };\n    \n    let state_voice = VoiceState {\n        user_id: data.user_id.clone(),\n        username,\n        avatar_url,\n        channel_id: data.channel_id.clone(),\n        server_id: data.server_id.clone(),\n        muted: false,\n        deafened: false,\n        socket_id: Some(socket.id.to_string()),\n    };\n    voice_users.insert(data.user_id.clone(), state_voice.clone());\n\n    let server_room = format!(\"server:{}\", data.server_id);\n    let _ = socket.to(server_room).emit(\"voice_state_update\", \u0026state_voice).await;\n    let _ = socket.emit(\"voice_state_update\", \u0026state_voice);\n    let _ = socket.to(room).emit(\"user_joined_voice\", \u0026data.user_id).await;\n}\n\npub async fn handle_leave_voice(\n    socket: SocketRef, \n    Data::\u003cLeaveVoicePayload\u003e(data): Data\u003cLeaveVoicePayload\u003e, \n    State::\u003cArc\u003cDashMap\u003cString, VoiceState\u003e\u003e\u003e(voice_users): State\u003cArc\u003cDashMap\u003cString, VoiceState\u003e\u003e\u003e\n) {\n    let room = format!(\"voice:{}\", data.channel_id);\n    println!(\"User {} leaving voice channel {}\", data.user_id, data.channel_id);\n    let _ = socket.leave(room.clone());\n    voice_users.remove(\u0026data.user_id);\n\n    let server_room = format!(\"server:{}\", data.server_id);\n    let _ = socket.to(server_room).emit(\"voice_user_left\", \u0026data).await;\n    let _ = socket.emit(\"voice_user_left\", \u0026data);\n    let _ = socket.to(room).emit(\"user_left_voice\", \u0026data.user_id).await;\n}\n\npub async fn handle_voice_mute(\n    socket: SocketRef, \n    Data::\u003cMutePayload\u003e(data): Data\u003cMutePayload\u003e, \n    State::\u003cArc\u003cDashMap\u003cString, VoiceState\u003e\u003e\u003e(voice_users): State\u003cArc\u003cDashMap\u003cString, VoiceState\u003e\u003e\u003e\n) {\n    if let Some(mut state_voice) = voice_users.get_mut(\u0026data.user_id) {\n        state_voice.muted = data.muted;\n        let updated_state = state_voice.clone();\n        let server_room = format!(\"server:{}\", data.server_id);\n        let _ = socket.to(server_room).emit(\"voice_state_update\", \u0026updated_state).await;\n        let _ = socket.emit(\"voice_state_update\", \u0026updated_state);\n    }\n}\n\npub async fn handle_offer(socket: SocketRef, Data::\u003cSignalPayload\u003e(data): Data\u003cSignalPayload\u003e) {\n    let target_room = format!(\"user:{}\", data.target_user_id);\n    let _ = socket.to(target_room).emit(\"offer\", \u0026data).await;\n}\n\npub async fn handle_answer(socket: SocketRef, Data::\u003cSignalPayload\u003e(data): Data\u003cSignalPayload\u003e) {\n    let target_room = format!(\"user:{}\", data.target_user_id);\n    let _ = socket.to(target_room).emit(\"answer\", \u0026data).await;\n}\n\npub async fn handle_ice_candidate(socket: SocketRef, Data::\u003cSignalPayload\u003e(data): Data\u003cSignalPayload\u003e) {\n    let target_room = format!(\"user:{}\", data.target_user_id);\n    let _ = socket.to(target_room).emit(\"ice_candidate\", \u0026data).await;\n}\n\npub async fn handle_leave(socket: SocketRef, Data::\u003cString\u003e(room): Data\u003cString\u003e) {\n    let _ = socket.leave(room);\n}\n\npub async fn handle_typing(socket: SocketRef, Data::\u003cTypingPayload\u003e(data): Data\u003cTypingPayload\u003e) {\n    let _ = socket.to(data.channel_id.clone()).emit(\"typing\", \u0026data).await;\n}\n\npub async fn handle_stop_typing(socket: SocketRef, Data::\u003cStopTypingPayload\u003e(data): Data\u003cStopTypingPayload\u003e) {\n    let _ = socket.to(data.channel_id.clone()).emit(\"stop_typing\", \u0026data).await;\n}\n\npub async fn handle_send_message(\n    socket: SocketRef, \n    Data::\u003cSendMessagePayload\u003e(data): Data\u003cSendMessagePayload\u003e, \n    State::\u003cPgPool\u003e(pool): State\u003cPgPool\u003e, \n    State::\u003credis::Client\u003e(redis_client): State\u003credis::Client\u003e\n) {\n    let created_at = chrono::Utc::now().timestamp_millis();\n    let result = sqlx::query_as::\u003c_, ChatMessage\u003e(\n        \"INSERT INTO messages (channel_id, author, author_id, content, created_at) VALUES ($1, $2, $3, $4, $5) RETURNING id, channel_id, author, author_id, content, created_at\"\n    )\n    .bind(\u0026data.channel_id)\n    .bind(\u0026data.author)\n    .bind(\u0026data.author_id)\n    .bind(\u0026data.content)\n    .bind(created_at)\n    .fetch_one(\u0026pool)\n    .await;\n\n    if let Ok(msg) = result {\n        if let Ok(mut conn) = redis_client.get_multiplexed_tokio_connection().await {\n            let cache_key = format!(\"messages:{}\", data.channel_id);\n            let _: () = conn.del(cache_key).await.unwrap_or_default();\n        }\n        let _ = socket.emit(\"message\", \u0026msg);\n        let _ = socket.to(data.channel_id.clone()).emit(\"message\", \u0026msg).await;\n\n            // Fetch channel info for notifications\n            let channel_id_uuid = Uuid::parse_str(\u0026data.channel_id).unwrap_or_default();\n            let channel: Option\u003ccrate::models::channel::Channel\u003e = sqlx::query_as(\n                \"SELECT * FROM channels WHERE id = $1\"\n            )\n            .bind(channel_id_uuid)\n            .fetch_optional(\u0026pool)\n            .await\n            .unwrap_or(None);\n\n            let channel_name = channel.as_ref()\n                .and_then(|c| c.name.clone())\n                .unwrap_or_else(|| \"un salon\".to_string());\n            \n            let is_dm = channel.as_ref().map(|c| c.kind == crate::models::channel::ChannelType::Dm).unwrap_or(false);\n\n            let mut notified_users = std::collections::HashSet::new();\n\n            // Handle DMs (notify recipient)\n            if is_dm {\n                if let Some(c) = channel.as_ref() {\n                    if let Some(recipient_id) = c.recipient_id {\n                        if Some(recipient_id) != data.author_id {\n                             let target_room = format!(\"user:{}\", recipient_id);\n                             let _ = socket.to(target_room).emit(\"notification\", \u0026serde_json::json!({\n                                 \"author\": data.author,\n                                 \"content\": data.content,\n                                 \"channelName\": \"un message privé\",\n                                 \"channelId\": data.channel_id,\n                                 \"isDm\": true\n                             })).await;\n                             notified_users.insert(recipient_id.to_string());\n                        }\n                    }\n                }\n            }\n\n            // Handle mentions\n            let mentions = parse_mentions(\u0026data.content);\n            for mentioned_user_id in mentions {\n                // Don't notify self\n                if let Some(author_id) = data.author_id {\n                    if mentioned_user_id == author_id.to_string() {\n                        continue;\n                    }\n                }\n                \n                // Don't notify twice\n                if notified_users.contains(\u0026mentioned_user_id) {\n                    continue;\n                }\n                \n                let target_room = format!(\"user:{}\", mentioned_user_id);\n                let _ = socket.to(target_room).emit(\"notification\", \u0026serde_json::json!({\n                    \"author\": data.author,\n                    \"content\": data.content,\n                    \"channelName\": if is_dm { \"un message privé\".to_string() } else { channel_name.clone() },\n                    \"channelId\": data.channel_id,\n                    \"isDm\": is_dm\n                })).await;\n                notified_users.insert(mentioned_user_id);\n            }\n\n            if let Some(author_id) = data.author_id {\n                if let Ok(sync) = trophee_service::sync_user_trophees(\u0026pool, author_id).await {\n                    if !sync.newly_unlocked.is_empty() {\n                        let room = format!(\"user:{}\", author_id);\n                        for trophy in \u0026sync.newly_unlocked {\n                            let _ = socket.to(room.clone()).emit(\"trophee_unlocked\", trophy).await;\n                        }\n                        let payload = serde_json::json!({ \"userId\": author_id.to_string() });\n                        let _ = socket.to(room).emit(\"trophees_updated\", \u0026payload).await;\n                    }\n            }\n        }\n    }\n}\n\npub async fn handle_screen_share_started(socket: SocketRef, Data::\u003cScreenSharePayload\u003e(data): Data\u003cScreenSharePayload\u003e) {\n    let channel_room = format!(\"voice:{}\", data.channel_id);\n    let _ = socket.to(channel_room).emit(\"peer_screen_share_started\", \u0026data).await;\n}\n\npub async fn handle_screen_share_stopped(socket: SocketRef, Data::\u003cScreenSharePayload\u003e(data): Data\u003cScreenSharePayload\u003e) {\n    let channel_room = format!(\"voice:{}\", data.channel_id);\n    let _ = socket.to(channel_room).emit(\"peer_screen_share_stopped\", \u0026data).await;\n}\n\npub async fn handle_camera_video_started(socket: SocketRef, Data::\u003cScreenSharePayload\u003e(data): Data\u003cScreenSharePayload\u003e) {\n    let channel_room = format!(\"voice:{}\", data.channel_id);\n    let _ = socket.to(channel_room).emit(\"peer_camera_video_started\", \u0026data).await;\n}\n\npub async fn handle_camera_video_stopped(socket: SocketRef, Data::\u003cScreenSharePayload\u003e(data): Data\u003cScreenSharePayload\u003e) {\n    let channel_room = format!(\"voice:{}\", data.channel_id);\n    let _ = socket.to(channel_room).emit(\"peer_camera_video_stopped\", \u0026data).await;\n}\n\npub async fn handle_add_reaction(\n    socket: SocketRef, \n    Data::\u003cReactionPayload\u003e(data): Data\u003cReactionPayload\u003e, \n    State::\u003cPgPool\u003e(pool): State\u003cPgPool\u003e\n) {\n    let user_id = match Uuid::parse_str(\u0026data.user_id) {\n        Ok(id) =\u003e id,\n        Err(_) =\u003e return,\n    };\n\n    let schema = AddReactionSchema {\n        message_id: data.message_id,\n        user_id,\n        emoji: data.emoji.clone(),\n    };\n\n    let channel_id = match add_reaction(\u0026pool, schema).await {\n        Ok(id) =\u003e id,\n        Err(_) =\u003e return,\n    };\n\n    let _ = socket.to(channel_id).emit(\"reaction_added\", \u0026data).await;\n    let _ = socket.emit(\"reaction_added\", \u0026data);\n\n    if let Ok(sync) = trophee_service::sync_user_trophees(\u0026pool, user_id).await {\n        if !sync.newly_unlocked.is_empty() {\n            let room = format!(\"user:{}\", user_id);\n            for trophy in \u0026sync.newly_unlocked {\n                let _ = socket.to(room.clone()).emit(\"trophee_unlocked\", trophy).await;\n            }\n            let payload = serde_json::json!({ \"userId\": user_id.to_string() });\n            let _ = socket.to(room).emit(\"trophees_updated\", \u0026payload).await;\n        }\n    }\n}\n\npub async fn handle_remove_reaction(\n    socket: SocketRef, \n    Data::\u003cReactionPayload\u003e(data): Data\u003cReactionPayload\u003e, \n    State::\u003cPgPool\u003e(pool): State\u003cPgPool\u003e\n) {\n    let user_id = match Uuid::parse_str(\u0026data.user_id) {\n        Ok(id) =\u003e id,\n        Err(_) =\u003e return,\n    };\n\n    let _ = sqlx::query(\n        \"DELETE FROM message_reactions WHERE message_id = $1 AND user_id = $2 AND emoji = $3\"\n    )\n    .bind(data.message_id)\n    .bind(user_id)\n    .bind(\u0026data.emoji)\n    .execute(\u0026pool)\n    .await;\n\n    let channel_id: Result\u003cString, _\u003e = sqlx::query_scalar(\"SELECT channel_id FROM messages WHERE id = $1\")\n        .bind(data.message_id)\n        .fetch_one(\u0026pool)\n        .await;\n\n    if let Ok(channel_id) = channel_id {\n        let _ = socket.to(channel_id).emit(\"reaction_removed\", \u0026data).await;\n        let _ = socket.emit(\"reaction_removed\", \u0026data);\n    }\n}\n\npub async fn handle_disconnect(socket: SocketRef, State::\u003cArc\u003cDashMap\u003cString, VoiceState\u003e\u003e\u003e(voice_users): State\u003cArc\u003cDashMap\u003cString, VoiceState\u003e\u003e\u003e) {\n    let socket_id = socket.id.to_string();\n    let mut user_to_remove = None;\n    for entry in voice_users.iter() {\n        if entry.value().socket_id.as_ref() == Some(\u0026socket_id) {\n            user_to_remove = Some(entry.value().clone());\n            break;\n        }\n    }\n    if let Some(sv) = user_to_remove {\n        voice_users.remove(\u0026sv.user_id);\n        let payload = LeaveVoicePayload {\n            channel_id: sv.channel_id.clone(),\n            user_id: sv.user_id.clone(),\n            server_id: sv.server_id.clone(),\n        };\n        let _ = socket.to(format!(\"server:{}\", sv.server_id)).emit(\"voice_user_left\", \u0026payload).await;\n        let _ = socket.to(format!(\"voice:{}\", sv.channel_id)).emit(\"user_left_voice\", \u0026sv.user_id).await;\n    }\n}\n\npub fn parse_mentions(content: \u0026str) -\u003e std::collections::HashSet\u003cString\u003e {\n    let mention_regex = Regex::new(r\"\u003c@([a-f0-9-]{36})\u003e\").unwrap();\n    let mut unique_mentions = std::collections::HashSet::new();\n    for cap in mention_regex.captures_iter(content) {\n        if let Some(matched) = cap.get(1) {\n            unique_mentions.insert(matched.as_str().to_string());\n        }\n    }\n    unique_mentions\n}\n\npub async fn broadcast_channel_created(io: \u0026socketioxide::SocketIo, server_id: Uuid, channel: Channel) {\n    let payload = ChannelCreatedPayload { channel, server_id };\n    let _ = io.to(format!(\"server:{}\", server_id)).emit(\"channel_created\", \u0026payload).await;\n}\n\npub async fn broadcast_channel_deleted(io: \u0026socketioxide::SocketIo, server_id: Uuid, channel_id: Uuid) {\n    let payload = ChannelDeletedPayload { channel_id, server_id };\n    let _ = io.to(format!(\"server:{}\", server_id)).emit(\"channel_deleted\", \u0026payload).await;\n}\n\npub async fn notify_member_removed(io: \u0026socketioxide::SocketIo, server_id: Uuid, user_id: Uuid) {\n    let payload = ServerMemberRemovedPayload { server_id, user_id };\n    let _ = io.to(format!(\"user:{}\", user_id)).emit(\"server_member_removed\", \u0026payload).await;\n}\n\npub async fn broadcast_message_deleted(io: \u0026socketioxide::SocketIo, channel_id: S     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/');
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
</script>
</body>
</html>
